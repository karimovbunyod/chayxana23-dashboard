<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chayxana23 — Админ панель</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --gold: #fcd34d;
      --dark-gold: #eab308;
      --bg: #0f172a;
      --card: #1e2937;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e2937);
      color: #e2e8f0;
      margin: 0;
      padding: 15px 10px;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 2.4rem;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(252,211,77,0.5);
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .controls {
      max-width: 1200px;
      margin: 0 auto 25px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .date-title {
      font-size: 1.35rem;
      color: var(--gold);
      font-weight: 600;
    }

    .controls-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    input, select, textarea, button {
      padding: 14px 16px;
      border-radius: 12px;
      border: none;
      background: #334155;
      color: white;
      font-size: 1rem;
    }

    /* ==================== GRID ==================== */
    .dashboard {
      display: grid !important;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1600px;
      margin: 20px auto;
      width: 100%;
    }

    .room {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      border: 1px solid rgba(234,179,8,0.3);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    .vip {
      border: 2px solid #f59e0b;
      box-shadow: 0 0 35px rgba(245,158,11,0.5);
    }

    .room h2 {
      text-align: center;
      color: var(--gold);
      margin: 0 0 20px 0;
      font-size: 1.75rem;
    }

    .booking {
      background: #1e2937;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      border-left: 6px solid #eab308;
    }

    .booking.confirmed { border-left-color: #22c55e; }
    .booking.waiting   { border-left-color: #eab308; }
    .booking.arrived   { border-left-color: #3b82f6; }
    .booking.cancelled { border-left-color: #ef4444; }

    /* Модальное окно */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 15px;
      overflow-y: auto;
    }

    .modal-content {
      background: #1e2937;
      width: 100%;
      max-width: 520px;
      border-radius: 20px;
      border: 2px solid var(--gold);
      max-height: 92vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 20px;
      text-align: center;
      background: #0f172a;
    }

    .modal-header h2 {
      margin: 0;
      color: var(--gold);
      font-size: 1.6rem;
    }

    .modal-body {
      padding: 20px;
    }

    .form-grid {
      display: grid !important;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 769px) {
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #cbd5e1;
    }

    .modal-footer {
      padding: 20px;
      display: flex;
      gap: 12px;
      background: #0f172a;
    }

    .modal-footer button {
      flex: 1;
      padding: 15px;
      font-size: 1.1rem;
      border-radius: 12px;
      font-weight: bold;
    }

    .save-btn { background: #22c55e; color: white; }
    .cancel-btn { background: #475569; color: white; }

    /* Адаптивность */
    @media (min-width: 769px) {
      .controls {
        flex-direction: row;
        justify-content: space-between;
      }
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }
      .room {
        max-width: 420px;
      }
    }

    @media (max-width: 480px) {
      h1 { font-size: 2rem; }
      .room { padding: 16px; }
      .booking { padding: 14px; }
    }

    /* Скрытие до логина */
    #dashboard, .controls, h1, .subtitle {
      display: none;
    }

    body.logged-in #dashboard,
    body.logged-in .controls,
    body.logged-in h1,
    body.logged-in .subtitle {
      display: block;
    }

    /* Отладка — должно быть видно красные рамки, если grid работает */
    .dashboard, .form-grid {
      border: 3px solid linear-gradient(135deg, #0f172a, #1e2937) !important;
    }

  </style>
</head>
<body>

  <!-- Окно авторизации -->
  <div id="loginScreen" style="position: fixed; inset: 0; background: #0f172a; z-index: 3000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white;">
    <div style="max-width: 400px; width: 90%; text-align: center;">
      <h1 style="margin-bottom: 10px;">Chayxana23</h1>
      <p style="color: #94a3b8; margin-bottom: 30px;">Админ панель</p>

      <div style="background: #1e2937; padding: 30px; border-radius: 20px; border: 1px solid #eab308;">
        <input type="text" id="username" placeholder="Логин (admin или guest)" 
               style="width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:none; background:#334155; color:white; font-size:1.05rem;">

        <input type="password" id="password" placeholder="Пароль" 
               style="width:100%; padding:14px; margin-bottom:20px; border-radius:12px; border:none; background:#334155; color:white; font-size:1.05rem;">

        <button onclick="checkLogin()" 
                style="width:100%; padding:14px; background:#eab308; color:black; border:none; border-radius:12px; font-size:1.1rem; font-weight:bold;">
          Войти
        </button>

        <p style="margin-top: 20px; font-size: 0.9rem; color: #94a3b8;">
          Гость: логин <strong>guest</strong> / пароль <strong>1111</strong>
        </p>

        <p id="loginError" style="color:#ef4444; margin-top:15px; display:none;">Неверный логин или пароль</p>
      </div>
    </div>
  </div>

  <h1>Chayxana23</h1>
  <p class="subtitle">Админ панель резерваций</p>

  <div class="controls">
    <!-- Заголовок с датой по центру -->
    <div id="dateTitle" style="font-size: 1.4rem; color: var(--gold); font-weight: 600; text-align: center; width: 100%; margin-bottom: 10px;">
      Брони на сегодня
    </div>
  
    <!-- Кнопки -->
    <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%;">
      <input type="date" id="filterDate" 
             style="padding: 12px 16px; font-size: 1.05rem; border-radius: 12px; background:#334155; color:white; border:none;">
      
      <button onclick="loadBookings()" 
              style="padding:12px 24px; background:#475569; color:white;">
        🔄 Обновить
      </button>
      
      <button onclick="addGlobalBooking()" 
              style="padding:12px 24px; background:#22c55e; color:white;">
        + Новая бронь
      </button>

      <button onclick="logout()" style="background:#ef4444; color:white; padding:12px 20px;">
        Выйти
      </button>

    </div>
  </div>

  <div class="dashboard" id="dashboard"></div>

  <!-- Модальное окно -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Добавить новую бронь</h2>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label>Имя клиента</label>
            <input type="text" id="clientName" placeholder="Например: Алишер Рахмонов">
          </div>
          <div class="form-group">
            <label>Номер телефона</label>
            <input type="tel" id="clientPhone" maxlength="20" 
                   placeholder="+998 (91) 659-77-88" 
                   oninput="formatPhone(this)"
                   onfocus="if(this.value.length < 5) this.value = '+998 ';">
          </div>
          <div class="form-group">
            <label>Дата бронирования</label>
            <input type="date" id="bookingDate">
          </div>
          <div class="form-group">
            <label>Время прихода</label>
            <select id="bookingTime"></select>
          </div>
          <div class="form-group">
            <label>Комната</label>
            <select id="roomSelect"></select>
          </div>
          <div class="form-group">
            <label>Статус</label>
            <select id="status">
              <option value="confirmed">✅ Подтверждено</option>
              <option value="waiting">⏳ В ожидании</option>
              <option value="arrived">👤 Пришёл</option>
              <option value="cancelled">❌ Отменено</option>
            </select>
          </div>
          <div class="form-group">
            <label>Заказ (сколько кг и что)</label>
            <textarea id="orderText" rows="3" placeholder="Плов — 4 кг, Шашлык — 2 кг, Кальян..."></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="save-btn" onclick="saveBooking()">Сохранить</button>
        <button class="cancel-btn" onclick="closeModal()">Отмена</button>
      </div>
    </div>
  </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyw7s5Mxct_QzDfa25k_3fJyiFlzZbm4HMEC6X6rjuVLE6ONgDusrXjieB3Er_cJQLKgg/exec';
    
        let bookings = [];
        let editingId = null;
        let currentUser = null;
    
        // ====================== API ======================
        async function apiRequest(action, payload = {}) {
          try {
            const response = await fetch(WEB_APP_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action, ...payload }),
              redirect: 'follow'
            });
        
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();
            if (!result.success && result.error) throw new Error(result.error);
            return result;
          } catch (err) {
            console.error(err);
            alert('Ошибка соединения с сервером: ' + err.message);
            throw err;
          }
        }
    
        // ====================== ЗАГРУЗКА БРОНЕЙ ======================
        async function loadBookings() {
          const selectedDate = document.getElementById('filterDate').value;
          try {
            const res = await fetch(WEB_APP_URL, { 
              method: 'GET',
              redirect: 'follow' 
            });
            let data = await res.json();
            
            if (data.error) throw new Error(data.error);
        
            if (selectedDate) {
              data = data.filter(b => b.date === selectedDate);
            }
        
            bookings = data || [];
            updateDateTitle(selectedDate);
            renderDashboard();
          } catch (err) {
            console.error("Ошибка загрузки:", err);
            alert("Не удалось загрузить брони. Проверьте интернет и Web App.");
          }
        }
    
        function updateDateTitle(selectedDate) {
          const titleEl = document.getElementById('dateTitle');
          if (!selectedDate) {
            titleEl.textContent = "Все брони";
            return;
          }
          const date = new Date(selectedDate);
          const options = { weekday: 'long', day: 'numeric', month: 'long' };
          const formatted = date.toLocaleDateString('ru-RU', options);
          titleEl.textContent = `Брони на ${formatted}`;
        }
    
        // ====================== РЕНДЕР ДАШБОРДА ======================
        function renderDashboard() {
          const container = document.getElementById('dashboard');
          container.innerHTML = '';
        
          const rooms = ["1-xona","2-xona","3-xona","4-xona","5-xona","6-xona","7-xona","8-xona","9-xona","VIP"];
        
          rooms.forEach(roomName => {
            const roomBookings = bookings
              .filter(b => b.room === roomName)
              .sort((a, b) => {
                if (a.date !== b.date) return (a.date || '').localeCompare(b.date || '');
                return (a.time || '').localeCompare(b.time || '');
              });
          
            const roomDiv = document.createElement('div');
            roomDiv.className = `room ${roomName === "VIP" ? "vip" : ""}`;
            roomDiv.innerHTML = `<h2>${roomName}</h2><div id="bookings-${roomName}"></div>`;
            container.appendChild(roomDiv);
          
            const div = document.getElementById(`bookings-${roomName}`);
          
            if (roomBookings.length === 0) {
              div.innerHTML = `
                <p style="text-align:center; color:#94a3b8; padding:50px 20px; font-size:1.1rem;">
                  На этот день в комнате ${roomName} нет броней<br>
                  <span style="font-size:0.95rem;">🎉 Можно отдохнуть</span>
                </p>`;
              return;
            }
        
            roomBookings.forEach(b => {
              const displayDate = b.date 
                ? new Date(b.date).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }) 
                : '';
            
              const displayTime = b.time || '—';
            
              let displayPhone = '—';
              if (b.phone) {
                let val = b.phone.toString().replace(/\D/g, '');
                if (val.startsWith('998')) val = val.substring(3);
                if (val.startsWith('8')) val = val.substring(1);
                val = val.substring(0, 9);
            
                displayPhone = '+998';
                if (val.length >= 2) displayPhone += ' (' + val.substring(0, 2) + ')';
                if (val.length >= 5) displayPhone += ' ' + val.substring(2, 5);
                if (val.length >= 7) displayPhone += '-' + val.substring(5, 7);
                if (val.length >= 9) displayPhone += '-' + val.substring(7, 9);
              }
          
              const statusClass = b.status || 'confirmed';
              const statusIcon = { confirmed: '✅', waiting: '⏳', arrived: '👤', cancelled: '❌' }[statusClass] || '✅';
          
              const bookingDiv = document.createElement('div');
              bookingDiv.className = `booking ${statusClass}`;
          
              bookingDiv.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
                  <div>
                    <strong style="font-size: 1.22rem;">${b.name}</strong><br>
                    <span style="color: #f472b6; font-size: 1.05rem;">📞 ${displayPhone}</span>
                  </div>
                  <div style="text-align: right;">
                    ${displayDate ? `<span style="color:#94a3b8; font-size:0.95rem;">${displayDate}</span><br>` : ''}
                    <span style="color: #fcd34d; font-size: 1.5rem; font-weight: 700;">${displayTime}</span>
                  </div>
                </div>
            
                ${b.order ? `<div style="margin: 10px 0 12px; color:#e2e8f0;">🍽️ ${b.order}</div>` : ''}
            
                <div style="margin-bottom: 14px;">
                  ${statusIcon} <strong>${getStatusText(statusClass)}</strong>
                </div>
            
                <div style="display: flex; gap: 12px;">
                  <button onclick="editBooking(${b.id})" 
                          style="flex:1; padding:12px; background:#eab308; color:black; border:none; border-radius:10px; font-weight:bold;">
                    Изменить
                  </button>
                  <button onclick="deleteBooking(${b.id})" 
                          style="flex:1; padding:12px; background:#ef4444; color:white; border:none; border-radius:10px; font-weight:bold;">
                    Удалить
                  </button>
                </div>
              `;
              div.appendChild(bookingDiv);
            });
          });
      
          // Скрываем кнопки для гостя
          if (currentUser && currentUser.role === "guest") {
            document.querySelectorAll('.booking button').forEach(btn => {
              btn.style.display = 'none';
            });
          }
        }
    
        function getStatusText(status) {
          const texts = {
            confirmed: 'Подтверждено',
            waiting: 'В ожидании',
            arrived: 'Пришёл',
            cancelled: 'Отменено'
          };
          return texts[status] || status;
        }
    
        // ====================== ФОРМАТИРОВАНИЕ ТЕЛЕФОНА ======================
        function formatPhone(input) {
          let value = input.value.replace(/\D/g, '');
        
          if (value.startsWith('8') && !value.startsWith('998')) value = '99' + value;
          if (value.startsWith('998')) value = value.substring(3);
          value = value.substring(0, 9);
        
          let formatted = '+998';
          if (value.length > 0) formatted += ' (' + value.substring(0, Math.min(2, value.length));
          if (value.length > 2) formatted += ') ' + value.substring(2, Math.min(5, value.length));
          if (value.length > 5) formatted += '-' + value.substring(5, Math.min(7, value.length));
          if (value.length > 7) formatted += '-' + value.substring(7, 9);
        
          input.value = formatted;
        }
    
        // ====================== ЗАПОЛНЕНИЕ ВРЕМЕНИ ======================
        function fillTimeOptions() {
          const select = document.getElementById('bookingTime');
          select.innerHTML = '';
        
          for (let h = 10; h <= 23; h++) {
            for (let m = 0; m < 60; m += 30) {
              const time = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
              const opt = document.createElement('option');
              opt.value = time;
              opt.textContent = time;
              select.appendChild(opt);
            }
          }
          // Ночные часы
          for (let h = 0; h <= 2; h++) {
            for (let m = 0; m < 60; m += 30) {
              const time = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
              const opt = document.createElement('option');
              opt.value = time;
              opt.textContent = time + " (ночь)";
              select.appendChild(opt);
            }
          }
        }
    
        // ====================== НОВАЯ БРОНЬ — СРАЗУ ======================
        window.addGlobalBooking = function() {
          editingId = null;
        
          document.getElementById('clientName').value = '';
          document.getElementById('clientPhone').value = '+998 ';
          document.getElementById('orderText').value = '';
          document.getElementById('status').value = 'confirmed';
        
          const roomSelect = document.getElementById('roomSelect');
          roomSelect.innerHTML = '';
          ["1-xona","2-xona","3-xona","4-xona","5-xona","6-xona","7-xona","8-xona","9-xona","VIP"].forEach(r => {
            const opt = document.createElement('option');
            opt.value = r; 
            opt.textContent = r;
            roomSelect.appendChild(opt);
          });
        
          fillTimeOptions();
          document.getElementById('bookingTime').value = '19:30';
        
          const today = new Date().toISOString().split('T')[0];
          document.getElementById('bookingDate').value = today;
        
          document.getElementById('modalTitle').textContent = 'Добавить новую бронь';
          document.getElementById('modal').style.display = 'flex';
        };
        
        // Закрытие модального окна
        function closeModal() {
          document.getElementById('modal').style.display = 'none';
          editingId = null;
        }
    
        // ====================== СОХРАНЕНИЕ — БЕЗ УСПЕШНОГО АЛЕРТА ======================
        async function saveBooking() {
          const name   = document.getElementById('clientName').value.trim();
          const phone  = document.getElementById('clientPhone').value.trim();
          const date   = document.getElementById('bookingDate').value;
          const time   = document.getElementById('bookingTime').value;
          const room   = document.getElementById('roomSelect').value;
          const status = document.getElementById('status').value;
          const order  = document.getElementById('orderText').value.trim();
        
          if (!name || !phone || !date || !time || !room) {
            alert('Пожалуйста, заполните все обязательные поля!');
            return;
          }
        
          const bookingData = {
            id: editingId || Date.now(),
            name: name,
            phone: phone,
            date: date,
            time: time,
            room: room,
            status: status,
            order: order || ''
          };
        
          try {
            const result = await apiRequest('saveBooking', { booking: bookingData });
          
            if (result.success) {
              closeModal();
              loadBookings();        // просто обновляем без алерта
            } else {
              alert('Ошибка сохранения: ' + (result.error || 'Неизвестная ошибка'));
            }
          } catch (err) {
            console.error(err);
            alert('Не удалось сохранить бронь. Проверьте подключение.');
          }
        }
        
        // ====================== ИЗМЕНИТЬ — СРАЗУ ======================
        window.editBooking = function(id) {
          const booking = bookings.find(b => b.id == id);
          if (!booking) return;
        
          editingId = booking.id;
        
          document.getElementById('clientName').value = booking.name || '';
          document.getElementById('clientPhone').value = booking.phone || '+998 ';
          document.getElementById('bookingDate').value = booking.date || '';
          document.getElementById('orderText').value = booking.order || '';
          document.getElementById('status').value = booking.status || 'confirmed';
        
          const roomSelect = document.getElementById('roomSelect');
          roomSelect.innerHTML = '';
          ["1-xona","2-xona","3-xona","4-xona","5-xona","6-xona","7-xona","8-xona","9-xona","VIP"].forEach(r => {
            const opt = document.createElement('option');
            opt.value = r;
            opt.textContent = r;
            if (r === booking.room) opt.selected = true;
            roomSelect.appendChild(opt);
          });
        
          fillTimeOptions();
          document.getElementById('bookingTime').value = booking.time || '19:30';
        
          document.getElementById('modalTitle').textContent = 'Редактировать бронь';
          document.getElementById('modal').style.display = 'flex';
        };
    
        // ====================== УДАЛЕНИЕ — СРАЗУ ======================
        window.deleteBooking = async function(id) {
          if (!id) return;
        
          try {
            const result = await apiRequest('deleteBooking', { id: id });
          
            if (result.success) {
              loadBookings();           // просто обновляем список
            } else {
              alert('Ошибка удаления: ' + (result.error || 'Неизвестная ошибка'));
            }
          } catch (err) {
            console.error(err);
            alert('Не удалось удалить бронь. Проверьте интернет.');
          }
        };
    
        // ====================== АВТОРИЗАЦИЯ ======================
        const USERS = {
          admin: { password: "23232323", role: "admin" },
          guest: { password: "1111",     role: "guest" }
        };
    
        function checkIfLoggedIn() {
          const savedUser = localStorage.getItem('currentUser');
          if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('loginScreen').style.display = 'none';
            document.body.classList.add('logged-in');
            applyRolePermissions();
            initDateFilter();
            loadBookings();
          }
        }
    
        function checkLogin() {
          const username = document.getElementById('username').value.trim().toLowerCase();
          const password = document.getElementById('password').value.trim();
          const errorMsg = document.getElementById('loginError');
        
          const user = USERS[username];
        
          if (user && user.password === password) {
            currentUser = { username, role: user.role };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
        
            document.getElementById('loginScreen').style.display = 'none';
            document.body.classList.add('logged-in');
        
            applyRolePermissions();
            initDateFilter();
            loadBookings();
          } else {
            errorMsg.style.display = 'block';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
          }
        }
    
        function applyRolePermissions() {
          const isGuest = currentUser.role === "guest";
          const addButtons = document.querySelectorAll('button[onclick="addGlobalBooking()"]');
          addButtons.forEach(btn => btn.style.display = isGuest ? 'none' : 'inline-block');
        }
    
        function logout() {
          if (confirm("Выйти из аккаунта?")) {
            localStorage.removeItem('currentUser');
            location.reload();
          }
        }
    
        function initDateFilter() {
          const dateInput = document.getElementById('filterDate');
          const today = new Date().toISOString().split('T')[0];
          dateInput.value = today;
          dateInput.addEventListener('change', loadBookings);
        }
    
        // ====================== ИНИЦИАЛИЗАЦИЯ ======================
        window.onload = function() {
          checkIfLoggedIn();
          document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkLogin();
          });
        };
    
        // Делаем функции доступными для onclick
        window.saveBooking = saveBooking;
        window.closeModal = closeModal;
    
    </script>
</body>
</html>
